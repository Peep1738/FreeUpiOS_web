<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO Activated | FreeUp iOS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>

    <div class="lang-switcher">
        <button class="lang-btn active" onclick="switchLang('ja')">JP</button>
        <button class="lang-btn" onclick="switchLang('en')">EN</button>
    </div>

    <div class="container">
        <header>
            <div class="app-icon">
                <img src="icon.png" alt="FreeUp iOS PRO Icon" style="width: 100%; height: 100%; object-fit: cover;">
                <div class="pro-badge">PRO</div>
            </div>
            <h1 id="title">ご支援ありがとうございます！</h1>
            <p class="welcome" id="welcome">PRO版へようこそ。すべての制限が解放されました。</p>
        </header>

        <div class="activation-card">
            <h2 id="card-title"><i data-lucide="key-round" size="24"></i>PRO機能の認証手順</h2>
            <p id="card-lead">決済完了後、noreply@sky1738.comから届くメールに記載されている *ライセンスキー（決済ID）* が必要です。</p>
            <ul class="step-list" id="steps">
                </ul>
        </div>

        <div class="widget-card">
            <h3 id="widget-title"><i data-lucide="layout-grid" size="20"></i>おまけ：専用ウィジェット</h3>
            <p id="widget-text">ホーム画面から1タップで最適化を開始できるiCloudショートカットを追加できます。</p>
            <a href="#" id="shortcut-link" target="_blank" rel="noopener noreferrer" class="btn-widget">ショートカットをダウンロード ↗︎</a>
        </div>

        <div class="support">
            <p id="support-text">ご不明な点や不具合がございましたら、お気軽に𝕏 (<a href="#" class="x-link link-text" target="_blank" rel="noopener noreferrer">@1738_sky</a>) までご連絡ください。</p>
        </div>

        <footer>
            &copy; 2026 Sky1738 All rights reserved. | <a href="#" class="x-link" target="_blank" rel="noopener noreferrer" style="color: #8e8e93; text-decoration: underline;">Support (𝕏)</a>
        </footer>
    </div>

    <script>
        const content = {
            ja: {
                title: "ご支援ありがとうございます！",
                welcome: "PRO版へようこそ。すべての制限が解放されました。",
                cardTitle: "<i data-lucide='key-round' size='24'></i>PRO機能の認証手順",
                cardLead: "決済完了後、noreply@sky1738.comから届くメールに記載されている *ライセンスキー（決済ID）* が必要です。",
                steps: [
                    "メールアプリを開き、以下のメールを探します。<br>件名：【FreeUpiOS】PRO版ライセンスキーのご案内 / Your License Key",
                    "メール内にある *ライセンスキー（決済ID）* をコピーします。",
                    "FreeUp iOSアプリを開き、設定（歯車アイコン）から **「ライセンスを復元 / プロモコード」** をタップします。",
                    "コピーしたIDを貼り付け、「認証」ボタンを押して完了させてください。"
                ],
                widgetTitle: "<i data-lucide='layout-grid' size='20'></i>おまけ：専用ウィジェット",
                widgetText: "ホーム画面から1タップで最適化を開始できるiCloudショートカットを追加できます。",
                widgetBtn: "ショートカットをダウンロード ↗︎",
                support: "ご不明な点や不具合がございましたら、お気軽に𝕏 (<a href='#' class='x-link link-text' target='_blank' rel='noopener noreferrer'>@1738_sky</a>) までご連絡ください。"
            },
            en: {
                title: "Thank You for Your Support!",
                welcome: "Welcome to PRO. All limitations have been removed.",
                cardTitle: "<i data-lucide='key-round' size='24'></i>How to Activate PRO",
                cardLead: "You will need the *License Key (Transaction ID)* provided in the email sent from noreply@sky1738.com after payment.",
                steps: [
                    "Open your email app and find the following email:<br>Subject: 【FreeUpiOS】PRO版ライセンスキーのご案内 / Your License Key",
                    "Copy the *License Key (Transaction ID)* inside the email.",
                    "Open the FreeUp iOS app, go to Settings (gear icon), and tap **\"Restore License / Promo Code\"**.",
                    "Paste the copied ID and tap the \"Unlock\" button to finish."
                ],
                widgetTitle: "<i data-lucide='layout-grid' size='20'></i>Bonus: Dedicated Widget",
                widgetText: "Add an iCloud shortcut to start optimization with a single tap from your Home Screen.",
                widgetBtn: "Download Shortcut ↗︎",
                support: "If you have any questions or issues, feel free to contact me on 𝕏 (<a href='#' class='x-link link-text' target='_blank' rel='noopener noreferrer'>@1738_sky</a>)."
            }
        };

        function switchLang(lang) {
            document.getElementById('title').innerHTML = content[lang].title;
            document.getElementById('welcome').innerText = content[lang].welcome;
            document.getElementById('card-title').innerHTML = content[lang].cardTitle;
            document.getElementById('card-lead').innerHTML = content[lang].cardLead;
            document.getElementById('widget-title').innerHTML = content[lang].widgetTitle;
            document.getElementById('widget-text').innerText = content[lang].widgetText;
            document.getElementById('widget-btn').innerText = content[lang].widgetBtn;
            document.getElementById('support-text').innerHTML = content[lang].support;

            const stepsUl = document.getElementById('steps');
            stepsUl.innerHTML = '';
            content[lang].steps.forEach(text => {
                const li = document.createElement('li');
                li.innerHTML = text; 
                stepsUl.appendChild(li);
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === (lang === 'ja' ? 'jp' : 'en'));
            });
            
            // config.js の設定を反映
            document.getElementById('shortcut-link').href = CONFIG.shortcutUrl;
            document.querySelectorAll('.x-link').forEach(el => el.href = CONFIG.xUrl);

            lucide.createIcons();
        }

        // 実行
        switchLang('ja');
    </script>
</body>
</html>
